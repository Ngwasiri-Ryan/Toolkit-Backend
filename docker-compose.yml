version: "3.8"

services:
  redis:
    image: redis:7-alpine
    container_name: toolkit_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  web:
    build: .
    container_name: toolkit_api
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite:///./toolkit.db
      - REDIS_URL=redis://redis:6379/0
      - STORAGE_BUCKET=toolkit-uploads
      - FREE_DAILY_CONVERSION_LIMIT=5
      - MAX_FILE_SIZE_MB=50
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  worker:
    build: .
    container_name: toolkit_worker
    command: celery -A app.tasks.celery_app.celery_app worker --loglevel=info -P solo
    volumes:
      - .:/app
    environment:
      - DATABASE_URL=sqlite:///./toolkit.db
      - REDIS_URL=redis://redis:6379/0
      - STORAGE_BUCKET=toolkit-uploads
    depends_on:
      redis:
        condition: service_healthy
